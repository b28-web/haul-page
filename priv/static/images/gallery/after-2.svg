<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#232323"/>
  <!-- Clean yard with simple ground and grass hints -->
  <rect x="60" y="440" width="680" height="120" fill="#262626"/>
  <line x1="60" y1="440" x2="740" y2="440" stroke="#333" stroke-width="2"/>
  <!-- Simple grass blades -->
  <g stroke="#3a3a3a" stroke-width="1.5" fill="none">
    <line x1="150" y1="440" x2="145" y2="420"/>
    <line x1="155" y1="440" x2="160" y2="418"/>
    <line x1="300" y1="440" x2="295" y2="422"/>
    <line x1="305" y1="440" x2="310" y2="420"/>
    <line x1="500" y1="440" x2="495" y2="418"/>
    <line x1="505" y1="440" x2="510" y2="422"/>
    <line x1="650" y1="440" x2="645" y2="420"/>
    <line x1="655" y1="440" x2="660" y2="418"/>
  </g>
  <!-- Sparkle marks -->
  <g fill="none" stroke="#555" stroke-width="2">
    <line x1="400" y1="180" x2="400" y2="210"/>
    <line x1="385" y1="195" x2="415" y2="195"/>
    <line x1="250" y1="300" x2="250" y2="320"/>
    <line x1="240" y1="310" x2="260" y2="310"/>
  </g>
  <!-- Label -->
  <text x="400" y="560" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#888" letter-spacing="8">AFTER</text>
</svg>
