<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#222"/>
  <!-- Clean desk -->
  <rect x="100" y="320" width="600" height="20" rx="2" fill="#333"/>
  <rect x="120" y="340" width="40" height="160" rx="2" fill="#2a2a2a"/>
  <rect x="640" y="340" width="40" height="160" rx="2" fill="#2a2a2a"/>
  <!-- Single monitor on desk -->
  <rect x="340" y="220" width="120" height="90" rx="4" fill="#2e2e2e"/>
  <rect x="385" y="310" width="30" height="10" fill="#2e2e2e"/>
  <!-- Sparkle marks -->
  <g fill="none" stroke="#555" stroke-width="2">
    <line x1="250" y1="260" x2="250" y2="280"/>
    <line x1="240" y1="270" x2="260" y2="270"/>
    <line x1="550" y1="240" x2="550" y2="260"/>
    <line x1="540" y1="250" x2="560" y2="250"/>
    <line x1="400" y1="180" x2="400" y2="200"/>
    <line x1="390" y1="190" x2="410" y2="190"/>
  </g>
  <!-- Label -->
  <text x="400" y="560" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#888" letter-spacing="8">AFTER</text>
</svg>
