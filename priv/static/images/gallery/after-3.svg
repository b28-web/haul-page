<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#242424"/>
  <!-- Clean office: just floor and walls -->
  <rect x="60" y="460" width="680" height="100" fill="#272727"/>
  <line x1="60" y1="460" x2="740" y2="460" stroke="#333" stroke-width="2"/>
  <!-- Subtle wall corner lines -->
  <line x1="60" y1="60" x2="60" y2="460" stroke="#2e2e2e" stroke-width="1"/>
  <line x1="740" y1="60" x2="740" y2="460" stroke="#2e2e2e" stroke-width="1"/>
  <line x1="60" y1="60" x2="740" y2="60" stroke="#2e2e2e" stroke-width="1"/>
  <!-- Sparkle marks suggesting clean space -->
  <g fill="none" stroke="#555" stroke-width="2">
    <line x1="300" y1="220" x2="300" y2="250"/>
    <line x1="285" y1="235" x2="315" y2="235"/>
    <line x1="500" y1="280" x2="500" y2="300"/>
    <line x1="490" y1="290" x2="510" y2="290"/>
    <line x1="200" y1="350" x2="200" y2="370"/>
    <line x1="190" y1="360" x2="210" y2="360"/>
    <line x1="600" y1="180" x2="600" y2="200"/>
    <line x1="590" y1="190" x2="610" y2="190"/>
  </g>
  <!-- Label -->
  <text x="400" y="560" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#888" letter-spacing="8">AFTER</text>
</svg>
