<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#222"/>
  <!-- Clean empty space with subtle floor line -->
  <line x1="60" y1="480" x2="740" y2="480" stroke="#333" stroke-width="2"/>
  <rect x="60" y="480" width="680" height="80" fill="#252525"/>
  <!-- Sparkle marks suggesting cleanliness -->
  <g fill="none" stroke="#555" stroke-width="2">
    <line x1="380" y1="200" x2="380" y2="230"/>
    <line x1="365" y1="215" x2="395" y2="215"/>
    <line x1="550" y1="300" x2="550" y2="320"/>
    <line x1="540" y1="310" x2="560" y2="310"/>
