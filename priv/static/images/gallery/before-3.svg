<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#1b1b1b"/>
  <!-- Office furniture shapes: desks, chairs, filing cabinets -->
  <rect x="80" y="100" width="200" height="80" rx="4" fill="#333"/>
  <rect x="80" y="180" width="10" height="60" fill="#2e2e2e"/>
  <rect x="270" y="180" width="10" height="60" fill="#2e2e2e"/>
  <rect x="350" y="120" width="60" height="180" rx="3" fill="#2c2c2c"/>
  <rect x="355" y="130" width="50" height="35" rx="2" fill="#363636"/>
  <rect x="355" y="175" width="50" height="35" rx="2" fill="#363636"/>
  <rect x="355" y="220" width="50" height="35" rx="2" fill="#363636"/>
  <rect x="500" y="150" width="180" height="70" rx="4" fill="#303030"/>
  <rect x="500" y="220" width="10" height="50" fill="#2a2a2a"/>
  <rect x="670" y="220" width="10" height="50" fill="#2a2a2a"/>
  <!-- Chair shapes -->
  <circle cx="200" cy="350" r="30" fill="#2e2e2e"/>
  <rect x="185" y="380" width="30" height="40" fill="#2a2a2a"/>
  <circle cx="500" cy="370" r="30" fill="#323232"/>
  <rect x="485" y="400" width="30" height="40" fill="#2e2e2e"/>
  <!-- More clutter -->
  <rect x="100" y="420" width="120" height="60" rx="3" fill="#343434" transform="rotate(-4 160 450)"/>
  <rect x="400" y="430" width="150" height="50" rx="3" fill="#2d2d2d" transform="rotate(3 475 455)"/>
  <!-- Label -->
  <text x="400" y="560" text-anchor="middle" font-family="sans-serif" font-size="36" font-weight="bold" fill="#888" letter-spacing="8">BEFORE</text>
</svg>
